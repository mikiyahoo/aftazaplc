---
deployment:
  tasks:
    - export DEPLOYPATH=/home/aftazaco/public_html/aftaza

    # Copy project files
    - /bin/cp -R * $DEPLOYPATH

    # Go to app folder
    - cd $DEPLOYPATH

    # Install dependencies
    - npm install

    # Generate Prisma client
    - npx prisma generate

    # Build Next.js
    - npm run build

    # Restart Node.js application
    - touch $DEPLOYPATH/tmp/restart.txt